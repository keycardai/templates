# See https://fly.io/docs/reference/configuration/ for full reference.
#
# Replace "autonomous-agent-snowflake-wif" with your app name at `fly launch` time.

app = "autonomous-agent-snowflake-wif"
primary_region = "iad"

[build]

[env]
  PORT = "9000"
  AGENT_KEYS_DIR = "/data/agent_keys"

[[mounts]]
  source = "agent_data"
  destination = "/data"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/.well-known/jwks.json"
    timeout = "5s"
