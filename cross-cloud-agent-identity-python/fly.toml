app = "cross-cloud-agent-identity"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8050"

[http_service]
  internal_port = 8050
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
