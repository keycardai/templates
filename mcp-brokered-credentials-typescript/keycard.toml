schema_version = "1"

[project]
name = "mcp-brokered-credentials-typescript"
kind = "mcp-server"

[zone]
url = "${KEYCARD_URL}"

[server]
command = "npm run start"
port = 8000

# Brokered application credentials.
#
# Both entries reference zone-vault resources that the agent created from
# this server's Keycard application client_id / secret. `keycard run` will
# fetch them and inject them into the process environment so the proxy can
# authenticate to Keycard's STS for token exchange — without secrets ever
# touching the filesystem.
#
# Identifiers are templated by the `keycard-template-app` scaffold step:
#   urn:<project-name>:client_id
#   urn:<project-name>:client_secret

[[credentials.default]]
env_var = "KEYCARD_CLIENT_ID"
resource = "urn:mcp-brokered-credentials-typescript:client_id"

[[credentials.default]]
env_var = "KEYCARD_CLIENT_SECRET"
resource = "urn:mcp-brokered-credentials-typescript:client_secret"
