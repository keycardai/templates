name: Template CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      template:
        description: "Template to verify (leave blank for all)"
        required: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.find.outputs.typescript }}
      python: ${{ steps.find.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          if [ -n "${{ inputs.template }}" ]; then
            # Detect language from the specified template
            if [ -f "${{ inputs.template }}/package.json" ]; then
              echo "typescript=[\"${{ inputs.template }}\"]" >> "$GITHUB_OUTPUT"
              echo "python=[]" >> "$GITHUB_OUTPUT"
            else
              echo "typescript=[]" >> "$GITHUB_OUTPUT"
              echo "python=[\"${{ inputs.template }}\"]" >> "$GITHUB_OUTPUT"
            fi
          else
            ts=$(find . -maxdepth 1 -mindepth 1 -type d ! -name '.*' ! -name 'scripts' ! -name 'eval' \
              -exec test -f '{}/package.json' \; -print \
              | sed 's|^\./||' | sort | jq -R . | jq -sc .)
            py=$(find . -maxdepth 1 -mindepth 1 -type d ! -name '.*' ! -name 'scripts' ! -name 'eval' \
              -exec test -f '{}/pyproject.toml' \; \
              ! -exec test -f '{}/package.json' \; -print \
              | sed 's|^\./||' | sort | jq -R . | jq -sc .)
            echo "typescript=$ts" >> "$GITHUB_OUTPUT"
            echo "python=$py" >> "$GITHUB_OUTPUT"
          fi

  verify-typescript:
    needs: discover
    if: needs.discover.outputs.typescript != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.discover.outputs.typescript) }}
    env:
      CI_KEYCARD_CLIENT_ID: ${{ secrets.CI_KEYCARD_CLIENT_ID }}
      CI_KEYCARD_CLIENT_SECRET: ${{ secrets.CI_KEYCARD_CLIENT_SECRET }}
      CI_KEYCARD_ENDPOINT: ${{ secrets.CI_KEYCARD_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.template }}/package*.json"

      - name: Install
        working-directory: ${{ matrix.template }}
        run: npm install

      - name: Build
        working-directory: ${{ matrix.template }}
        run: npm run build

      - name: Create ephemeral zone
        id: zone
        run: |
          ZONE_NAME="templates-ci-${{ github.run_id }}-${{ strategy.job-index }}"
          TOKEN=$(curl -sf -X POST "${CI_KEYCARD_ENDPOINT}/service-account-token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CI_KEYCARD_CLIENT_ID}" \
            -d "client_secret=${CI_KEYCARD_CLIENT_SECRET}" \
            | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "Failed to obtain access token"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"
          sleep 5
          ZONE=$(curl -sf -X POST "${CI_KEYCARD_ENDPOINT}/zones" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${ZONE_NAME}\"}")
          echo "ZONE_ID=$(echo "$ZONE" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "KEYCARD_URL=$(echo "$ZONE" | jq -r '.protocols.oauth2.issuer')" >> "$GITHUB_OUTPUT"

      - name: Start server and verify
        working-directory: ${{ matrix.template }}
        env:
          PORT: "8000"
          KEYCARD_URL: ${{ steps.zone.outputs.KEYCARD_URL }}
          KEYCARD_CLIENT_ID: ${{ secrets.CI_KEYCARD_CLIENT_ID }}
          KEYCARD_CLIENT_SECRET: ${{ secrets.CI_KEYCARD_CLIENT_SECRET }}
        run: npm run ci:verify

      - name: Delete ephemeral zone
        if: always()
        run: |
          [ -n "${{ steps.zone.outputs.ZONE_ID }}" ] && \
            curl -sf -X DELETE "${CI_KEYCARD_ENDPOINT}/zones/${{ steps.zone.outputs.ZONE_ID }}" \
              -H "Authorization: Bearer $TOKEN" && echo "Zone deleted" || true

  verify-python:
    needs: discover
    if: needs.discover.outputs.python != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.discover.outputs.python) }}
    env:
      CI_KEYCARD_CLIENT_ID: ${{ secrets.CI_KEYCARD_CLIENT_ID }}
      CI_KEYCARD_CLIENT_SECRET: ${{ secrets.CI_KEYCARD_CLIENT_SECRET }}
      CI_KEYCARD_ENDPOINT: ${{ secrets.CI_KEYCARD_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: ${{ matrix.template }}
        run: uv sync

      - name: Create ephemeral zone
        id: zone
        run: |
          ZONE_NAME="templates-ci-${{ github.run_id }}-${{ strategy.job-index }}"
          TOKEN=$(curl -sf -X POST "${CI_KEYCARD_ENDPOINT}/service-account-token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CI_KEYCARD_CLIENT_ID}" \
            -d "client_secret=${CI_KEYCARD_CLIENT_SECRET}" \
            | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "Failed to obtain access token"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"
          sleep 5
          ZONE=$(curl -sf -X POST "${CI_KEYCARD_ENDPOINT}/zones" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${ZONE_NAME}\"}")
          echo "ZONE_ID=$(echo "$ZONE" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "KEYCARD_URL=$(echo "$ZONE" | jq -r '.protocols.oauth2.issuer')" >> "$GITHUB_OUTPUT"

      - name: Start server and verify
        working-directory: ${{ matrix.template }}
        env:
          PORT: "8000"
          KEYCARD_URL: ${{ steps.zone.outputs.KEYCARD_URL }}
          KEYCARD_CLIENT_ID: ${{ secrets.CI_KEYCARD_CLIENT_ID }}
          KEYCARD_CLIENT_SECRET: ${{ secrets.CI_KEYCARD_CLIENT_SECRET }}
        run: bash scripts/ci-verify.sh

      - name: Delete ephemeral zone
        if: always()
        run: |
          [ -n "${{ steps.zone.outputs.ZONE_ID }}" ] && \
            curl -sf -X DELETE "${CI_KEYCARD_ENDPOINT}/zones/${{ steps.zone.outputs.ZONE_ID }}" \
              -H "Authorization: Bearer $TOKEN" && echo "Zone deleted" || true
