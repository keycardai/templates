name: Template CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      template:
        description: "Template to verify (leave blank for all)"
        required: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find.outputs.templates }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          if [ -n "${{ inputs.template }}" ]; then
            echo "templates=[\"${{ inputs.template }}\"]" >> "$GITHUB_OUTPUT"
          else
            dirs=$(find . -maxdepth 1 -mindepth 1 -type d ! -name '.*' ! -name 'scripts' \
              -exec test -f '{}/package.json' \; -print \
              | sed 's|^\./||' | sort | jq -R . | jq -sc .)
            echo "templates=$dirs" >> "$GITHUB_OUTPUT"
          fi

  verify-typescript:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.discover.outputs.templates) }}
    env:
      CI_KEYCARD_CLIENT_ID: ${{ secrets.CI_KEYCARD_CLIENT_ID }}
      CI_KEYCARD_CLIENT_SECRET: ${{ secrets.CI_KEYCARD_CLIENT_SECRET }}
      CI_KEYCARD_ENDPOINT: ${{ secrets.CI_KEYCARD_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.template }}/package-lock.json"

      - name: Install
        working-directory: ${{ matrix.template }}
        run: npm install

      - name: Build
        working-directory: ${{ matrix.template }}
        run: npm run build

      - name: Create ephemeral zone
        id: zone
        run: |
          ZONE_NAME="templates-ci-${{ github.run_id }}-${{ strategy.job-index }}"

          # Exchange service account credentials for an access token
          TOKEN=$(curl -sf -X POST "${CI_KEYCARD_ENDPOINT}/service-account-token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${CI_KEYCARD_CLIENT_ID}" \
            -d "client_secret=${CI_KEYCARD_CLIENT_SECRET}" \
            | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to obtain access token"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"

          # Create an ephemeral zone for this test run
          ZONE=$(curl -sf -X POST "${CI_KEYCARD_ENDPOINT}/zones" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${ZONE_NAME}\"}")

          ZONE_ID=$(echo "$ZONE" | jq -r '.id')
          KEYCARD_URL=$(echo "$ZONE" | jq -r '.protocols.oauth2.issuer')

          echo "ZONE_ID=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "KEYCARD_URL=$KEYCARD_URL" >> "$GITHUB_OUTPUT"
          echo "Created zone: $ZONE_ID ($KEYCARD_URL)"

      - name: Start server and verify
        working-directory: ${{ matrix.template }}
        env:
          PORT: "8000"
          KEYCARD_URL: ${{ steps.zone.outputs.KEYCARD_URL }}
        run: |
          node dist/server.js &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            echo "Waiting... ($i/10)"
            sleep 2
          done

          # Verify health
          curl -sf http://localhost:8000/healthz | jq .

          # Verify .well-known endpoints
          echo "Checking .well-known/oauth-protected-resource..."
          curl -sf http://localhost:8000/.well-known/oauth-protected-resource | jq .

          echo "Checking .well-known/oauth-authorization-server..."
          curl -sf http://localhost:8000/.well-known/oauth-authorization-server | jq .

          kill $SERVER_PID

      - name: Delete ephemeral zone
        if: always()
        run: |
          if [ -n "${{ steps.zone.outputs.ZONE_ID }}" ]; then
            curl -sf -X DELETE "${CI_KEYCARD_ENDPOINT}/zones/${{ steps.zone.outputs.ZONE_ID }}" \
              -H "Authorization: Bearer $TOKEN" && echo "Zone deleted"
          fi
